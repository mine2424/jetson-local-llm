# /etc/systemd/system/ollama.service.d/jetson.conf
# Jetson Orin Nano Super 最適化設定
#
# ⚠️ DEPRECATED: このファイルは現在使用しません
#
# Ollama は jetson-containers (Docker コンテナ) として動作するため、
# ネイティブ Ollama の systemd サービスは不要です。
# 環境変数は setup/08_setup_jetson_containers.sh の `docker run` で設定しています。
#
# 参照 (現行のコンテナ起動方法):
#   bash setup/08_setup_jetson_containers.sh
#   bash install.sh
#
# ── 以下は参考情報として残しています ─────────────────────────────────────────
# (ネイティブ Ollama を使う場合のみ有効)

[Service]
# GPU使用（Jetson統合GPU）
Environment="OLLAMA_NUM_GPU=1"

# モデル保存先（NVMe SSD）
Environment="OLLAMA_MODELS=/home/jetson/.ollama/models"

# API接続（ローカルのみ）
Environment="OLLAMA_HOST=127.0.0.1:11434"

# コンテキストキャッシュ（メモリ節約）
Environment="OLLAMA_KEEP_ALIVE=5m"

# 並列リクエスト数（メモリ制約上1に制限）
Environment="OLLAMA_MAX_LOADED_MODELS=1"

# Flash Attention 有効化（省メモリ）
Environment="OLLAMA_FLASH_ATTENTION=1"

# デフォルト32768→2048に制限 (KVキャッシュ3.7GB→234MB削減)
Environment="OLLAMA_NUM_CTX=2048"
