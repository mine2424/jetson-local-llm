# /etc/systemd/system/ollama.service.d/jetson.conf
# Jetson Orin Nano Super 最適化設定
#
# 適用方法:
#   sudo cp this_file /etc/systemd/system/ollama.service.d/jetson.conf
#   sudo systemctl daemon-reload
#   sudo systemctl restart ollama

[Service]
# GPU使用（Jetson統合GPU）
Environment="OLLAMA_NUM_GPU=1"

# モデル保存先（NVMe SSD）
Environment="OLLAMA_MODELS=/home/jetson/.ollama/models"

# API接続（ローカルのみ）
Environment="OLLAMA_HOST=127.0.0.1:11434"

# コンテキストキャッシュ（メモリ節約）
Environment="OLLAMA_KEEP_ALIVE=5m"

# 並列リクエスト数（メモリ制約上1に制限）
Environment="OLLAMA_MAX_LOADED_MODELS=1"

# Flash Attention 有効化（省メモリ）
Environment="OLLAMA_FLASH_ATTENTION=1"
